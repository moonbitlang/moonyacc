name: check

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Moon
        uses: moonbit-community/setup-moonbit@main
        with: 
          version: stable

      - name: Setup MSVC
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: moon version
        run: |
          moon version --all
          moonrun --version

      - name: moon update
        run: |
          moon update

      - name: moon check
        run: |
          moon check --deny-warn
          moon -C tests check --deny-warn

      - name: moon info
        run: |
          moon info --target all
          moon -C tests info --target all
          git diff --exit-code

      - name: moon fmt
        run: |
          moon fmt
          moon -C tests fmt
          git diff --exit-code

      - name: Set ulimit on unix
        if: ${{ runner.os != 'Windows' }}
        run: |
          ulimit -s 8176

      - name: moon test
        run: |
          moon test --target all
          moon test --target all --release
          moon -C tests test --target all
          moon -C tests test --target all --release
